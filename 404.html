<!DOCTYPE html>
<html lang="en" data-theme="dusk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lost in the rain &middot; Kasper Krog</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/lantern.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0e1216">
  <script>
    var now = Date.now();
    var hour = new Date(now).getHours();
    var theme = hour >= 7 && hour < 19 ? 'dawn' : 'dusk';
    try {
      var saved = JSON.parse(localStorage.getItem('kk-theme'));
      if (saved && (saved.theme === 'dawn' || saved.theme === 'dusk') && saved.expiresAt > now) {
        theme = saved.theme;
      } else {
        localStorage.removeItem('kk-theme');
      }
    } catch (e) {
      try { localStorage.removeItem('kk-theme'); } catch (storageError) {}
    }
    document.documentElement.dataset.theme = theme;
    document.querySelector('meta[name="theme-color"]').content = theme === 'dawn' ? '#ece5d6' : '#0e1216';
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lost {
      max-width: var(--wide);
      margin: 0 auto;
      padding: clamp(7rem, 22vh, 14rem) 1.5rem 6rem;
    }
  </style>
</head>
<body>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>

  <main>
    <section class="lost">
      <p class="mono eyebrow reveal is-visible">404 &middot; off the map</p>
      <h1 class="reveal is-visible">The rain has washed<br><em>this page away.</em></h1>
      <p class="lead reveal is-visible">
        Whatever stood here has drifted out past the harbor wall.
        The light is still on at home.
      </p>
      <p class="mono hint reveal is-visible"><a href="/">&larr; back to the harbor</a></p>
    </section>
  </main>

  <script>
    /* A quieter copy of the rain, for lost pages. */
    (function () {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      var canvas = document.getElementById("rain");
      var ctx = canvas.getContext("2d");
      var w, h, drops, DRIFT = 0.18;
      function makeDrop() {
        return {
          x: Math.random() * (w + 40), y: Math.random() * h,
          len: 9 + Math.random() * 14, speed: 1.4 + Math.random() * 2.1,
          alpha: 0.04 + Math.random() * 0.1
        };
      }
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        var count = Math.min(150, Math.floor((w * h) / 14000));
        drops = [];
        for (var i = 0; i < count; i++) drops.push(makeDrop());
      }
      resize();
      window.addEventListener("resize", resize);
      (function frame() {
        ctx.clearRect(0, 0, w, h);
        ctx.lineWidth = 1;
        for (var i = 0; i < drops.length; i++) {
          var d = drops[i];
          ctx.strokeStyle = "rgba(213, 205, 186, " + d.alpha + ")";
          ctx.beginPath();
          ctx.moveTo(d.x, d.y);
          ctx.lineTo(d.x - d.len * DRIFT, d.y + d.len);
          ctx.stroke();
          d.y += d.speed;
          d.x -= d.speed * DRIFT;
          if (d.y > h + 20) { d.y = -20; d.x = Math.random() * (w + 40); }
        }
        window.requestAnimationFrame(frame);
      })();
    })();
  </script>
</body>
</html>
