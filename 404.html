<!DOCTYPE html>
<html lang="en" data-theme="dusk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lost in the rain &middot; Kasper Krog</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/lantern.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0e1216">
  <script>
    var now = Date.now();
    var hour = new Date(now).getHours();
    var theme = hour >= 7 && hour < 19 ? 'dawn' : 'dusk';
    try {
      var saved = JSON.parse(localStorage.getItem('kk-theme'));
      if (saved && (saved.theme === 'dawn' || saved.theme === 'dusk') && saved.expiresAt > now) {
        theme = saved.theme;
      } else {
        localStorage.removeItem('kk-theme');
      }
    } catch (e) {
      try { localStorage.removeItem('kk-theme'); } catch (storageError) {}
    }
    document.documentElement.dataset.theme = theme;
    document.querySelector('meta[name="theme-color"]').content = theme === 'dawn' ? '#ece5d6' : '#0e1216';
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=EB+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <a class="skip-link mono" href="#main-content">Skip to main</a>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-head">
    <a class="mono head-label" href="/">Kasper Krog</a>
    <nav class="site-nav mono" aria-label="Rooms of the site">
      <a href="/">Harbor</a>
      <a href="/journal/">Journal</a>
      <a href="/shelf/">Shelf</a>
      <a href="/gatherings/">Gatherings</a>
      <a href="/worlds/">Worlds</a>
      <a href="/rituals/">Rituals</a>
      <a href="/keeper/">Keeper</a>
    </nav>
    <button id="lantern" type="button" aria-pressed="false" aria-label="Toggle between night and daylight">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 3h4"/>
        <path d="M12 3v3"/>
        <path d="M8.5 6h7l1 2.5v7L15 18H9l-1.5-2.5v-7Z"/>
        <path d="M12 9.5c1.4 1.8 1.4 3.2 0 4.2c-1.4-1-1.4-2.4 0-4.2Z" fill="currentColor" stroke="none"/>
        <path d="M9 21h6"/>
      </svg>
    </button>
  </header>

  <main id="main-content" tabindex="-1">
    <section class="lost">
      <p class="mono eyebrow reveal">404 &middot; off the map</p>
      <h1 class="reveal">The rain has washed<br><em>this page away.</em></h1>
      <p class="lead reveal">
        Whatever stood here has drifted out past the harbor wall.
        The light is still on at home.
      </p>
      <p class="mono hint reveal"><a href="/">&larr; back to the harbor</a></p>
    </section>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
